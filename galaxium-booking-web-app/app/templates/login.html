<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Galaxium Traveler Login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <style>
    body {
      min-height: 100vh;
      background: radial-gradient(circle at 20% 20%, #1e3a8a 0%, #111827 45%, #030712 100%);
      color: #f8fafc;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
    }
    .login-card {
      width: 100%;
      max-width: 420px;
      background: rgba(255, 255, 255, 0.96);
      color: #111827;
      border-radius: 14px;
      box-shadow: 0 12px 28px rgba(0, 0, 0, 0.35);
      padding: 1.5rem;
    }
  </style>
</head>
<body>
  <div class="login-card">
    <h4 class="mb-3">Traveler Authentication</h4>
    <p class="text-muted">Sign in with your Keycloak traveler account to continue.</p>

    {% if error %}
      <div class="alert alert-danger" role="alert">{{ error }}</div>
    {% endif %}

    <form method="post" action="/login" class="d-grid gap-2">
      <input type="hidden" name="next" value="{{ next_path }}"/>
      <div>
        <label class="form-label">Username</label>
        <input name="username" class="form-control" autocomplete="username" required/>
      </div>
      <div>
        <label class="form-label">Password</label>
        <input name="password" type="password" class="form-control" autocomplete="current-password" required/>
      </div>
      <button class="btn btn-primary mt-2" type="submit">Login</button>
    </form>

    <hr/>
    <p class="small text-muted mb-0">
      Demo credentials (local realm import):<br/>
      <code>demo-user / demo-user-password</code>
    </p>
  </div>
</body>
</html>
