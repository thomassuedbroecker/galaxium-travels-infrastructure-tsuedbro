<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Galaxium Traveler Login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="{{ url_for('static', filename='style.css') }}" rel="stylesheet"/>
</head>
<body class="login-page">
  <div class="login-shell">
    <div class="login-card">
      <p class="login-eyebrow">Galaxium access</p>
      <h1 class="login-title">Traveler Authentication</h1>
      <p class="login-subtitle">Sign in with your Keycloak traveler account to continue to the flight desk.</p>
      <img
        class="login-brand"
        src="{{ url_for('static', filename='galaxium-travels-logo.png') }}"
        alt="Galaxium Travels artwork"
      />

      {% if error %}
        <div class="alert alert-danger" role="alert">{{ error }}</div>
      {% endif %}

      <form method="post" action="/login" class="d-grid gap-2">
        <input type="hidden" name="next" value="{{ next_path }}"/>
        <div>
          <label class="form-label">Username</label>
          <input name="username" class="form-control" autocomplete="username" required/>
        </div>
        <div>
          <label class="form-label">Password</label>
          <input name="password" type="password" class="form-control" autocomplete="current-password" required/>
        </div>
        <button class="btn btn-primary mt-2" type="submit">Login</button>
      </form>

      <hr/>
      <p class="small login-help mb-0">
        Demo credentials (local realm import):<br/>
        <code>demo-user / demo-user-password</code>
      </p>
    </div>
  </div>
</body>
</html>
