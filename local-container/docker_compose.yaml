services:
  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    container_name: keycloak
    command: ["start-dev", "--import-realm"]
    ports:
      - 8080:8080
    environment:
      - KEYCLOAK_ADMIN=admin
      - KEYCLOAK_ADMIN_PASSWORD=admin
    volumes:
      - ./keycloak/realm:/opt/keycloak/data/import

  hr_database:
    build:
      context: ../HR_database
    image: hr_database:1.0.0
    container_name: hr_database
    ports:
      - 8081:8081
  
  booking_system:
    build:
      context: ../booking_system_rest
    image: booking_system_rest:1.0.0
    container_name: booking_system_rest
    ports:
      - 8082:8082
    depends_on:
      - keycloak
    environment:
      - AUTH_ENABLED=true
      - OIDC_ISSUER=http://keycloak:8080/realms/galaxium
      - OIDC_AUDIENCE=booking-api

  booking_system_mcp:
    build:
      context: ../booking_system_mcp
    image: booking_system_mcp:1.0.0
    container_name: booking_system_mcp
    ports:
      - 8084:8084
    depends_on:
      - keycloak
    environment:
      - AUTH_ENABLED=true
      - OIDC_ISSUER=http://keycloak:8080/realms/galaxium
      - OIDC_AUDIENCE=booking-api
      - OIDC_AUTHORIZATION_SERVER_URL=http://localhost:8080/realms/galaxium
  web_app:
    build:
      context: ../galaxium-booking-web-app
    image: web_app:1.0.0
    container_name: web_app
    ports:
      - 8083:8083
    depends_on:
      - keycloak
      - booking_system
    environment:
      - BACKEND_URL=http://booking_system:8082
      - OAUTH2_ENABLED=true
      - FRONTEND_AUTH_REQUIRED=true
      - OIDC_TOKEN_URL=http://keycloak:8080/realms/galaxium/protocol/openid-connect/token
      - OIDC_CLIENT_ID=web-app-proxy
      - OIDC_CLIENT_SECRET=web-app-proxy-secret
      - OIDC_SCOPE=openid profile email
      - FLASK_SECRET_KEY=local-dev-secret-key

  web_app_mcp:
    build:
      context: ../galaxium-booking-web-app-mcp
    image: web_app_mcp:1.0.0
    container_name: web_app_mcp
    ports:
      - 8085:8085
    depends_on:
      - keycloak
      - booking_system_mcp
    environment:
      - PORT=8085
      - MCP_SERVER_URL=http://booking_system_mcp:8084/mcp
      - MCP_TIMEOUT_SECONDS=10
      - OAUTH2_ENABLED=true
      - FRONTEND_AUTH_REQUIRED=true
      - OIDC_TOKEN_URL=http://keycloak:8080/realms/galaxium/protocol/openid-connect/token
      - OIDC_CLIENT_ID=web-app-proxy
      - OIDC_CLIENT_SECRET=web-app-proxy-secret
      - OIDC_SCOPE=openid profile email
      - FLASK_SECRET_KEY=local-dev-secret-key
